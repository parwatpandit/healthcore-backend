server {
    listen 80;
    server_name your-domain.com your-ec2-ip;

    # Frontend — serve React build
    location / {
        root /var/www/healthcore;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://unix:/home/ubuntu/healthcore-backend/healthcore.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files
    location /media/ {
        alias /home/ubuntu/healthcore-backend/media/;
    }

    # Static files
    location /static/ {
        alias /home/ubuntu/healthcore-backend/staticfiles/;
    }

    client_max_body_size 10M;
}