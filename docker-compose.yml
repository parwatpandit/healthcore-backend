version: '3.9'

services:

  # PostgreSQL Database
  db:
    image: postgres:16
    container_name: healthcore_db
    environment:
      POSTGRES_DB: healthcore_db
      POSTGRES_USER: healthcore_user
      POSTGRES_PASSWORD: healthcore_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcore_user -d healthcore_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: healthcore_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build: .
    container_name: healthcore_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DB_NAME=healthcore_db
      - DB_USER=healthcore_user
      - DB_PASSWORD=healthcore_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker
  celery_worker:
    build: .
    container_name: healthcore_celery_worker
    command: celery -A healthcore worker --loglevel=info --pool=solo
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DB_NAME=healthcore_db
      - DB_USER=healthcore_user
      - DB_PASSWORD=healthcore_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Beat
  celery_beat:
    build: .
    container_name: healthcore_celery_beat
    command: >
      sh -c "sleep 15 &&
             celery -A healthcore beat --loglevel=info"
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DB_NAME=healthcore_db
      - DB_USER=healthcore_user
      - DB_PASSWORD=healthcore_pass
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ../healthcore-frontend
      dockerfile: Dockerfile
    container_name: healthcore_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_files: